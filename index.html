<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ritmo" />
<meta name="theme-color" content="#F6F1E8" />
<link rel="apple-touch-icon" sizes="180x180" href="icon-180-3.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192-3.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512-3.png" />
<link rel="manifest" href="manifest.webmanifest" />
<title>Ritmo</title>

<style>
:root{
  --bg:#F6F1E8;
  --card:#FFFCF6;
  --text:#181816;
  --muted:#6d6d68;
  --border:rgba(0,0,0,.10);
  --green:#4F7D5B;
  --amber-bg:#EFE3C8;
  --amber-text:#6D5630;
  --radius:18px;
}
*{box-sizing:border-box}
html,body{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
  overscroll-behavior-x:none;
}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.app{
  max-width:520px;
  width:100%;
  overflow-x:hidden;
  margin:0 auto;
  padding:calc(18px + env(safe-area-inset-top)) 16px calc(100px + env(safe-area-inset-bottom));
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:14px;
}
.top-actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
.top-actions select{
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  border-radius:999px;
  padding:8px 10px;
  font-size:13px;
  font-weight:750;
  outline:none;
  max-width:118px;
}
h1{
  font-size:34px;
  line-height:1;
  margin:0 0 8px;
  letter-spacing:-.04em;
}
.date{
  color:var(--muted);
  font-size:15px;
}
.status{
  font-size:13px;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:6px;
  margin-top:4px;
}
.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--muted);
}
.dot.ok{background:var(--green)}
.dot.err{background:#E24B4A}
.summary{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  margin:14px 0 16px;
}
.summary-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}
.summary-title{
  font-size:15px;
  font-weight:650;
}
.summary-pct{
  font-size:18px;
  font-weight:800;
  text-align:right;
}
.bar{
  height:8px;
  background:rgba(0,0,0,.08);
  border-radius:999px;
  overflow:hidden;
}
.fill{
  height:100%;
  width:0%;
  background:var(--green);
  border-radius:999px;
  transition:.25s width ease;
}
.summary-foot{
  display:none;
}

.view-filter{
  display:none;
}.view-filter label{
  display:none;
}
.view-filter select{
  width:100%;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  border-radius:999px;
  padding:13px 16px;
  font-size:17px;
  font-weight:800;
  outline:none;
  box-shadow:0 1px 0 rgba(0,0,0,.03);
}
.filter-note{
  display:none;
}
.categories-container{
  margin-top:4px;
}


.time-section{
  margin-top:14px;
}
.time-header{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  user-select:none;
}
.time-title-wrap{
  display:flex;
  align-items:center;
  gap:8px;
}
.time-title{
  font-size:20px;
  font-weight:800;
}
.caret{
  color:var(--muted);
  font-size:15px;
  width:18px;
  text-align:center;
}
.time-count{
  font-size:14px;
  color:var(--muted);
  font-weight:650;
}
.time-body{
  margin-top:8px;
  display:none;
}
.time-section.open .time-body{
  display:block;
}
.category-group{
  margin-bottom:14px;
}
.category-header{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  color:var(--text);
  user-select:none;
  cursor:pointer;
  box-shadow:0 1px 0 rgba(0,0,0,.03);
}
.category-title{
  display:flex;
  align-items:center;
  gap:12px;
  flex:1;
  min-width:0;
  font-size:17px;
  font-weight:850;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.category-caret{
  color:var(--muted);
  font-size:22px;
  width:18px;
  text-align:center;
}
.category-icon{
  font-size:21px;
  width:26px;
  text-align:center;
}
.category-actions{
  display:flex;
  align-items:center;
  gap:10px;
}
.category-count{
  font-size:17px;
  color:var(--text);
  font-weight:850;
  white-space:nowrap;
}
.category-summary-btn{
  display:none;
}
.category-body{
  display:block;
  margin-top:10px;
}

.item{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:13px 12px;
  margin-bottom:9px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.item-left{
  min-width:0;
  flex:1;
  display:flex;
  gap:10px;
  align-items:flex-start;
  cursor:pointer;
}
.item-icon{
  width:24px;
  flex:0 0 24px;
  font-size:18px;
  line-height:1.2;
  margin-top:1px;
}
.item-text{
  min-width:0;
}
.item-name{
  font-size:16px;
  font-weight:650;
  line-height:1.25;
}
.item.done .item-name{
  text-decoration:line-through;
  color:#9b9b95;
}
.item-meta{
  margin-top:3px;
  font-size:12px;
  color:var(--muted);
  line-height:1.35;
}
.badge{
  display:inline-block;
  margin-left:4px;
  padding:2px 7px;
  border-radius:999px;
  background:var(--amber-bg);
  color:var(--amber-text);
  font-size:11px;
  vertical-align:1px;
}
.check{
  width:34px;
  height:34px;
  flex:0 0 34px;
  border-radius:50%;
  border:1.5px solid var(--border);
  background:var(--card);
  color:white;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.item.done .check{
  background:var(--green);
  border-color:var(--green);
}
.empty{
  border:1px dashed var(--border);
  color:var(--muted);
  border-radius:14px;
  padding:14px;
  font-size:14px;
  text-align:center;
  background:rgba(255,255,255,.45);
  margin-bottom:9px;
}
.small-btn{
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  border-radius:999px;
  padding:8px 12px;
  font-size:13px;
  cursor:pointer;
}
.error-box{
  display:none;
  background:var(--card);
  border:1px solid rgba(226,75,74,.25);
  color:#8a1f1f;
  border-radius:14px;
  padding:12px;
  margin:12px 0;
  font-size:13px;
  line-height:1.45;
  white-space:pre-wrap;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.38);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:18px;
}
.modal-card{
  width:100%;
  max-width:420px;
  max-width:min(420px, calc(100vw - 36px));
  max-height:82vh;
  overflow:auto;
  background:var(--card);
  border-radius:26px;
  padding:22px 18px;
}
.modal-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:12px;
}
.modal-title{
  font-size:24px;
  line-height:1.1;
  font-weight:800;
  letter-spacing:-.03em;
}
.modal-subtitle{
  margin-top:6px;
  color:var(--muted);
  font-size:13px;
}
.modal-close{
  border:1px solid var(--border);
  background:var(--card);
  border-radius:999px;
  width:34px;
  height:34px;
  font-size:20px;
  cursor:pointer;
}
.history-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin:14px 0;
}
.stat-card{
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  background:var(--card);
}
.stat-value{
  font-size:20px;
  font-weight:800;
}
.stat-label{
  font-size:12px;
  color:var(--muted);
  margin-top:3px;
}
.history-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(0,0,0,.07);
  padding:10px 2px;
  font-size:14px;
}
.history-row:last-child{
  border-bottom:none;
}
.history-empty{
  color:var(--muted);
  text-align:center;
  padding:20px 8px;
  border:1px dashed var(--border);
  border-radius:14px;
}
.product-summary-row{
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
  margin-bottom:9px;
  background:var(--card);
}
.product-summary-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-size:15px;
  font-weight:750;
}
.product-summary-meta{
  margin-top:5px;
  color:var(--muted);
  font-size:13px;
}

.view-mode{
  display:flex;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:999px;
  padding:3px;
  gap:3px;
}
.bottom-nav{
  display:none;
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:50;
  padding:0 16px calc(10px + env(safe-area-inset-bottom));
  pointer-events:none;
}
.bottom-nav-inner{
  pointer-events:auto;
  max-width:420px;
  margin:0 auto;
  height:58px;
  max-height:58px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:2px;
  padding:0 6px;
  overflow:hidden;
  box-sizing:border-box;
}
.bottom-nav-btn{
  -webkit-appearance:none;
  appearance:none;
  -webkit-tap-highlight-color:transparent;
  outline:none;
  box-sizing:border-box;
  height:48px;
  max-height:48px;
  width:56px;
  max-width:56px;
  flex:0 0 56px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  border:0;
  margin:0;
  background:transparent;
  color:var(--muted);
  padding:0;
  border-radius:999px;
  font-size:10px;
  font-weight:750;
  line-height:1;
  cursor:pointer;
  overflow:hidden;
}
.bottom-nav-icon{
  width:18px;
  height:18px;
  max-width:18px;
  max-height:18px;
  flex:0 0 18px;
  display:block;
}
.bottom-nav-btn span{
  line-height:1;
  white-space:nowrap;
}
.bottom-nav-btn.active{
  background:var(--text);
  color:#fff;
}
.view-mode button{
  border:0;
  background:transparent;
  color:var(--muted);
  border-radius:999px;
  padding:7px 10px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
}
.view-mode button.active{
  background:var(--text);
  color:#fff;
}
.ritmo-period{
  margin-bottom:10px;
}
.ritmo-period button{
  flex:1;
  padding:11px 8px;
}
.ritmo-period-picker{
  margin-bottom:14px;
}
.ritmo-period-picker input{
  width:100%;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  border-radius:16px;
  padding:13px 14px;
  font-size:15px;
  font-weight:700;
  outline:none;
}
.ritmo-msg{
  margin-top:8px;
  font-size:14px;
  color:var(--muted);
  line-height:1.4;
}
.ritmo-controls{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin:0 0 12px;
}
.ritmo-pill{
  border:1px solid var(--border);
  background:var(--card);
  color:var(--muted);
  border-radius:999px;
  padding:10px 8px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
}
.ritmo-pill.active{
  background:var(--text);
  color:#fff;
  border-color:var(--text);
}
.ritmo-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px 14px;
  margin-bottom:12px;
}
.ritmo-card-title{
  font-size:17px;
  font-weight:850;
  margin-bottom:10px;
}
.ritmo-insight{
  font-size:17px;
  font-weight:750;
  line-height:1.35;
}
.ritmo-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:12px 0;
  border-bottom:1px solid rgba(0,0,0,.07);
}
.ritmo-row.clickable{
  cursor:pointer;
}
.ritmo-row.clickable:hover{
  opacity:.78;
}
.ritmo-row:last-child{border-bottom:none;}
.ritmo-row-left{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:750;
}
.ritmo-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--green);
  flex:0 0 10px;
}
.ritmo-dot.mid{background:#E4A72C;}
.ritmo-dot.low{background:#E35D5B;}
.ritmo-value{font-weight:900;}
.ritmo-mini-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:12px;
}
.ritmo-mini{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:13px;
}
.ritmo-mini-label{
  color:var(--muted);
  font-size:12px;
  font-weight:750;
  margin-bottom:4px;
}
.ritmo-mini-value{
  font-size:18px;
  font-weight:900;
}
.ritmo-detail-btn{
  width:100%;
  border:0;
  background:var(--text);
  color:#fff;
  border-radius:16px;
  padding:15px;
  font-size:16px;
  font-weight:850;
  cursor:pointer;
  margin-bottom:12px;
}
.ritmo-detail{display:none;}
.ritmo-detail.open{display:block;}
.ritmo-empty{
  border:1px dashed var(--border);
  color:var(--muted);
  border-radius:14px;
  padding:14px;
  background:rgba(255,255,255,.45);
  text-align:center;
}

.product-group{
  border:1px solid var(--border);
  border-radius:16px;
  padding:13px;
  background:var(--card);
  margin-bottom:10px;
}
.product-group-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  cursor:pointer;
}
.product-group-title{
  font-size:16px;
  font-weight:850;
}
.product-group-status{
  margin-top:4px;
  color:var(--muted);
  font-size:13px;
}
.product-group-value{
  font-weight:900;
  white-space:nowrap;
}
.product-hours{
  display:none;
  margin-top:10px;
  border-top:1px solid rgba(0,0,0,.07);
  padding-top:8px;
}
.product-group.open .product-hours{display:block;}
.hour-row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  color:var(--muted);
  font-size:13px;
}
.hour-row strong{color:var(--text);}
.soft-status{
  border:1px solid var(--border);
  background:var(--card);
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  font-weight:750;
  line-height:1.35;
}

.category-ritmo-hero{
  border:1px solid var(--border);
  background:var(--card);
  border-radius:20px;
  padding:16px;
  margin:14px 0 12px;
}
.category-ritmo-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
}
.category-ritmo-label{
  color:var(--muted);
  font-size:13px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.category-ritmo-message{
  margin-top:4px;
  font-size:18px;
  font-weight:850;
  line-height:1.2;
}
.category-ritmo-pct{
  font-size:42px;
  font-weight:950;
  letter-spacing:-.06em;
  line-height:.95;
}
.category-ritmo-note{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
  line-height:1.35;
  font-weight:650;
}
.product-group-value{
  color:var(--muted);
  font-size:18px;
}

.note{
  color:var(--muted);
  font-size:13px;
  line-height:1.4;
}


.single-stat{grid-template-columns:1fr !important;}
.ritmo-only-card{text-align:left;}
  .add-form{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:14px;
}

.add-form input,
.add-form select,
.add-form textarea{
  width:100%;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  border-radius:16px;
  padding:14px 14px;
  font-size:16px;
  font-weight:650;
  outline:none;
}

.add-form textarea{
  min-height:84px;
  resize:none;
}

.add-form label{
  font-size:13px;
  color:var(--muted);
  font-weight:800;
  margin-bottom:-6px;
}

.add-form button{
  width:100%;
  border:0;
  background:var(--text);
  color:#fff;
  border-radius:18px;
  padding:16px;
  font-size:17px;
  font-weight:900;
  cursor:pointer;
  margin-top:4px;
}

.add-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}


.order-btns{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.order-btn{
  border:1px solid var(--border);
  background:var(--card);
  color:var(--muted);
  border-radius:10px;
  width:28px;
  height:24px;
  font-size:13px;
  font-weight:900;
  line-height:1;
  cursor:pointer;
}

.time-label{
  color:var(--muted);
  font-size:13px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.06em;
  margin:18px 4px 8px;
}
.time-label:first-child{
  margin-top:4px;
}

.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.login-card{
  width:100%;
  max-width:360px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:26px;
  padding:28px 22px;
}
.login-title{
  font-size:28px;
  font-weight:850;
  letter-spacing:-.03em;
  margin-bottom:4px;
}
.login-subtitle{
  color:var(--muted);
  font-size:14px;
  margin-bottom:20px;
}
.login-card input,
.login-card select{
  width:100%;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  border-radius:16px;
  padding:14px;
  font-size:16px;
  font-weight:650;
  outline:none;
  margin-bottom:12px;
}
.login-card button{
  width:100%;
  border:0;
  background:var(--text);
  color:#fff;
  border-radius:18px;
  padding:16px;
  font-size:17px;
  font-weight:900;
  cursor:pointer;
}
.login-error{
  color:#8a1f1f;
  font-size:13px;
  margin:-4px 0 12px;
  min-height:16px;
}
.logout-btn{
  border:1px solid var(--border);
  background:var(--card);
  color:var(--muted);
  border-radius:999px;
  padding:8px 12px;
  font-size:13px;

function pad(n){ return String(n).padStart(2,"0"); }

function todayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function currentMonthValue(){
  const d = new Date();

}

function todayDow(){
  return DAYS_ES[new Date().getDay()];
}

function currentTimeSection(){
  const h = new Date().getHours();

}
function weatherIcon(code){
  if(code === 0) return "☀️";
  if([1,2,3].includes(code)) return "🌤️";
  if([45,48].includes(code)) return "🌫️";
  if([51,53,55,61,63,65,80,81,82].includes(code)) return "🌧️";
  if([95,96,99].includes(code)) return "⛈️";
  return "🌡️";
}

async function cargarClima(){

    const fecha = localDateText();

    const lat = 23.063;
    const lon = -109.703;

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`;

    const res = await fetch(url);
    const data = await res.json();

    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weather_code;

    line.textContent = `${fecha} · ${temp}°C ${weatherIcon(code)}`;
  }catch(e){
    document.getElementById("date-line").textContent = localDateText();
  }
}

function cleanId(s){
  return String(s || "")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g,"-")
    .replace(/[^a-zA-Z0-9-_]/g,"");
}

function normalizarTexto(s){
  return String(s || "")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .toLowerCase()
    .trim();
}

function obtenerNombresExistentes(){
  const nombres = new Set();

  Object.entries(planObj || {}).forEach(([categoria, tiempos])=>{

      Object.keys(productos || {}).forEach(nombre=>{

      });

  return Array.from(nombres);
}

function sugerirProducto(valor){

  const inputNorm = normalizarTexto(valor);

function localDateText(){
  const d = new Date();
  const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

function getUsuarioActual(){
  return localStorage.getItem("ritmoUsuarioV1") || "";
}

async function postSheets(action, data = {}){
  const sinUsuarioRequerido = action === "login" || action === "getUsuarios";
  const payloadData = sinUsuarioRequerido ? data : Object.assign({ usuario: getUsuarioActual() }, data);

  const res = await fetch(API, {
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body:JSON.stringify({ action, data: payloadData })
  });

  const raw = await res.text();
  let json;
  try {
    json = JSON.parse(raw);
  } catch(e) {
    throw new Error(`La función no regresó JSON.\nStatus: ${res.status}\nRespuesta: ${raw.slice(0,250)}`);
  }

  if(!res.ok || json.error){
    throw new Error(json.error || `Error HTTP ${res.status}`);
  }

  return json;
}

let checkEnCurso = false;

async function cargar(){
  if(checkEnCurso) return;
  try{
    showError("");

    // Render rápido con la última versión guardada localmente.
    // Esto evita pantalla vacía mientras Apps Script responde.
    const cachedRaw = localStorage.getItem("ritmoCacheV3");
    if(cachedRaw && !todayItems.length){
      try{
        const cached = JSON.parse(cachedRaw);
        if(cached && cached.plan){
          planObj = cached.plan || {};
          checksObj = cached.checks || {};
          productosTerminados = cached.terminados || [];
          productosCatalogo = cached.catalogo || [];
          if(cached.report) ritmoReport = cached.report;
          setStatus("Actualizando...", "");
          render();
        }
      }catch(_e){}
    }else{
      setStatus("Sincronizando...", "");
    }

    const fecha = todayKey();
    const initial = await postSheets("getInitialData", {
      fecha,
      incluirRitmo: viewMode === "ritmo",
      periodo: "mes_custom",
      valor: currentMonthValue()
    });

    planObj = initial.plan || {};
    checksObj = initial.checks || {};
    productosTerminados = initial.terminados || [];
    productosCatalogo = initial.catalogo || productosCatalogo || [];
    if(initial.report) ritmoReport = initial.report;

    localStorage.setItem("ritmoCacheV3", JSON.stringify({
      plan: planObj,
      checks: checksObj,
      terminados: productosTerminados,
      catalogo: productosCatalogo,
      report: ritmoReport,
      savedAt: Date.now()
    }));

    setStatus("Sincronizado", "ok");
    render();

  }catch(e){
    console.error(e);
    setStatus("Error conexión", "err");
    showError(e.message || String(e));
  }
}

function getDiasRestantes(cfg){
  // Días futuros que faltan después de hoy.
  // Ejemplo: tratamiento 20 días que inició el 11/04, el 25/04 faltan 5 días: 26,27,28,29,30.
  if(!cfg || !cfg.inicio || !cfg.diasCiclo) return null;
  const inicio = new Date(cfg.inicio + "T12:00:00");
  const hoy = new Date(todayKey() + "T12:00:00");
  const total = Number(cfg.diasCiclo);
  if(!total) return null;

  const fin = new Date(inicio);
  fin.setDate(fin.getDate() + total - 1);

  const restantes = Math.round((fin - hoy) / 86400000);
  return Math.max(0, restantes);
}

function cicloActivoHoy(cfg){
  if(!cfg || !cfg.inicio || !cfg.diasCiclo) return true;
  const inicio = new Date(cfg.inicio + "T12:00:00");
  const hoy = new Date(todayKey() + "T12:00:00");
  const diff = Math.round((hoy - inicio) / 86400000);
  const total = Number(cfg.diasCiclo);
  if(!total) return true;

  return diff >= 0 && diff < total;
}

function isActiveCfg(cfg){
  if(!cfg) return false;

  const dow = todayDow();
  const dias = cfg.days ?? cfg.dias ?? "todos";

  let dayOk = false;
  if(dias === "todos") dayOk = true;
  else if(Array.isArray(dias)) dayOk = dias.includes(dow);
  else dayOk = String(dias).split(",").map(x=>x.trim()).includes(dow);

  if(!dayOk) return false;

  if(cfg.inicio){
    if(cfg.inicio > todayKey()) return false;
    if(cfg.diasCiclo && !cicloActivoHoy(cfg)) return false;
  }

  return true;
}

function flattenPlan(){
  const out = [];
  Object.entries(planObj || {}).forEach(([categoria, times])=>{
    TIMES.forEach(tiempo=>{
      Object.entries((times && times[tiempo]) || {}).forEach(([nombre, cfg])=>{
        if(isActiveCfg(cfg)){
          out.push({
            categoria,
            tiempo,
            nombre,
            note: cfg.note || cfg.nota || "",
            inicio: cfg.inicio || "",
            diasRestantes: cfg.diasCiclo ? getDiasRestantes(cfg) : null,
            diasCicloTotal: cfg.diasCiclo || null,
            rowNumber: cfg.rowNumber || null,
            sheetOrder: cfg.sheetOrder || cfg.rowNumber || 999999
          });
        }
      });
    });
  });


  out.sort((a,b)=>{
    const timeDiff = (TIME_ORDER[a.tiempo] || 99) - (TIME_ORDER[b.tiempo] || 99);
    if(timeDiff !== 0) return timeDiff;
    return (a.sheetOrder || 999999) - (b.sheetOrder || 999999);
  });

  return out;
}

function formatFecha(fecha){
  if(!fecha) return "";
  const partes = fecha.split("-");
  if(partes.length !== 3) return fecha;
  return `${partes[2]}/${partes[1]}/${partes[0]}`;
}

function addDaysKey(fechaKey, dias){
  const d = new Date(fechaKey + "T12:00:00");
  d.setDate(d.getDate() + dias);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function normalizarFechaKey(valor){
  if(!valor) return "";
  const s = String(valor).trim();

  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return `${m[1]}-${pad(m[2])}-${pad(m[3])}`;

  m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(m) return `${m[3]}-${pad(m[2])}-${pad(m[1])}`;

  const d = new Date(s);
  if(!isNaN(d.getTime())) return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

  return s;
}

function esCompletado(valor){
  if(valor === true || valor === 1) return true;
  const s = String(valor ?? "")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .trim()
    .toLowerCase();
  return ["true","si","yes","1","x","ok","aplicado","completado","done"].includes(s);
}

function normalizarHistorial(historial){
  const mapa = {};
  (historial || []).forEach(h=>{
    if(!h) return;
    const fecha = normalizarFechaKey(h.fecha || h.Fecha || h.date || h.Date);
    if(!fecha) return;
    const valor = h.completado ?? h.Completado ?? h.aplicado ?? h.Aplicado ?? h.status ?? h.Status ?? h.estado ?? h.Estado;
    mapa[fecha] = esCompletado(valor);
  });
  return mapa;
}

function construirHistorialCompleto(itemActual, historialServidor){
  const mapa = normalizarHistorial(historialServidor);

  if(itemActual && itemActual.inicio && itemActual.diasCicloTotal){
    const total = Number(itemActual.diasCicloTotal);
    const hoy = todayKey();
    const filas = [];

    for(let i = 0; i < total; i++){
      const fecha = addDaysKey(itemActual.inicio, i);
      if(fecha > hoy) break;
      filas.push({ fecha, completado: !!mapa[fecha] });
    }

    (historialServidor || []).forEach(h=>{
      const fechaExtra = h ? normalizarFechaKey(h.fecha || h.Fecha || h.date || h.Date) : "";
      if(fechaExtra && !filas.some(x=>x.fecha === fechaExtra)){
        const valor = h.completado ?? h.Completado ?? h.aplicado ?? h.Aplicado ?? h.status ?? h.Status ?? h.estado ?? h.Estado;
        filas.push({ fecha:fechaExtra, completado:esCompletado(valor) });
      }
    });

    filas.sort((a,b)=> b.fecha.localeCompare(a.fecha));
    return filas;
  }

  return (historialServidor || []).slice().sort((a,b)=> String(b.fecha || "").localeCompare(String(a.fecha || "")));
}

function calcularDiasRestantesItem(item){
  if(!item || !item.inicio || !item.diasCicloTotal) return 0;

  const inicio = new Date(item.inicio + "T12:00:00");
  const hoy = new Date(todayKey() + "T12:00:00");
  const total = Number(item.diasCicloTotal);
  if(!total) return 0;

  const fin = new Date(inicio);
  fin.setDate(fin.getDate() + total - 1);

  const restantes = Math.round((fin - hoy) / 86400000);
  return Math.max(0, restantes);
}

function agruparAccionesPorNombre(productos){
  const map = {};

  productos.forEach(p=>{
    const key = String(p.nombre || "").trim();
    if(!map[key]){
      map[key] = {
        nombre:p.nombre,
        categoria:p.categoria,
        usados:0,
        esperados:0,
        horarios:[]
      };
    }

    const usados = Number(p.usados || 0);
    const esperados = Number(p.esperados || 0);
    map[key].usados += usados;
    map[key].esperados += esperados;
    map[key].horarios.push({
      tiempo:p.tiempo,
      usados,
      esperados,
      pct:p.pct,
      nombre:p.nombre,
      categoria:p.categoria
    });
  });

  return Object.values(map).map(g=>{
    g.pendientes = Math.max(0, g.esperados - g.usados);
    g.pct = g.esperados ? Math.min(100, Math.round(g.usados / g.esperados * 100)) : null;
    return g;
  }).sort((a,b)=>{
    if(b.pendientes !== a.pendientes) return b.pendientes - a.pendientes;
    const ap = a.pct === null || a.pct === undefined ? 101 : a.pct;
    const bp = b.pct === null || b.pct === undefined ? 101 : b.pct;
    if(ap !== bp) return ap - bp;
    return String(a.nombre).localeCompare(String(b.nombre));
  });
}

}

  const note = document.getElementById("filter-note");
  const summaryBox = document.getElementById("summary-box");

  if(cont) cont.innerHTML = "";

  if(viewMode === "ritmo"){
    if(summaryBox) summaryBox.style.display = "none";
    if(note) note.textContent = "";
    renderRitmoReport(cont);
    return;
  }

  if(viewMode === "equipo"){

    return;
  }

  if(summaryBox) summaryBox.style.display = "block";

  todayItems = flattenPlan();

  let total = todayItems.length;
  let done = todayItems.filter(it => getCheck(it.categoria, it.tiempo, it.nombre)).length;
  let pct = total ? Math.round(done / total * 100) : 0;

  document.getElementById("pct").textContent = pct + "%";
  document.getElementById("ritmo-msg").textContent = getRitmoMensaje(pct);
  document.getElementById("fill").style.width = pct + "%";
  document.getElementById("done-count").textContent = `${done}/${total} completados`;
  document.getElementById("pending-count").textContent = `${Math.max(0,total-done)} pendientes`;

  if(note){
    note.textContent = total
      ? `${done}/${total} actividades completadas hoy.`
      : "No hay actividades programadas para hoy.";
  }

  if(!total){
    cont.innerHTML = `<div class="empty">Nada programado para hoy.</div>`;
    return;
  }

  todayItems.forEach(it=>{
    cont.appendChild(renderItem(it));
  });
}
function startPointerDrag(event, rowNumber){
  if(!rowNumber) return;
  // Para mouse usamos el drag nativo; para touch/pen usamos pointer events.
  if(event.pointerType === "mouse") return;
  event.preventDefault();
  event.stopPropagation();
  pointerDrag = { sourceRowNumber:Number(rowNumber) };
  const item = event.target.closest(".item");
  if(item) item.classList.add("dragging");
  document.body.classList.add("no-scroll");
  window.addEventListener("pointermove", handlePointerDragMove, { passive:false });
  window.addEventListener("pointerup", handlePointerDragEnd, { once:true });
  window.addEventListener("pointercancel", handlePointerDragCancel, { once:true });
}

function handlePointerDragMove(event){
  if(!pointerDrag) return;
  event.preventDefault();
  document.querySelectorAll(".item.drag-over").forEach(el=>el.classList.remove("drag-over"));
  const target = document.elementFromPoint(event.clientX, event.clientY)?.closest?.(".item[data-row-number]");
  if(target && Number(target.dataset.rowNumber) !== pointerDrag.sourceRowNumber){
    target.classList.add("drag-over");
    pointerDrag.targetRowNumber = Number(target.dataset.rowNumber);
    const rect = target.getBoundingClientRect();
    pointerDrag.position = event.clientY > rect.top + rect.height / 2 ? "after" : "before";
  }
}

async function handlePointerDragEnd(){
  window.removeEventListener("pointermove", handlePointerDragMove);
  document.body.classList.remove("no-scroll");
  const drag = pointerDrag;
  pointerDrag = null;
  handleDragEnd();
  if(!drag || !drag.sourceRowNumber || !drag.targetRowNumber || drag.sourceRowNumber === drag.targetRowNumber) return;
  try{
    setStatus("Reordenando...", "");
    await postSheets("moveProductoTo", {
      sourceRowNumber: drag.sourceRowNumber,
      targetRowNumber: drag.targetRowNumber,
      position: drag.position || "before"
    });
    await cargar();
  }catch(e){
    console.error(e);
    setStatus("Error reordenando", "err");
    showError(e.message || String(e));
  }
}

function handlePointerDragCancel(){
  window.removeEventListener("pointermove", handlePointerDragMove);
  document.body.classList.remove("no-scroll");
  pointerDrag = null;
  handleDragEnd();
}

function handleDragStart(event, rowNumber){
  if(!rowNumber) return;
  draggedRowNumber = Number(rowNumber);
  const item = event.currentTarget.closest(".item");
  if(item) item.classList.add("dragging");
  event.dataTransfer.effectAllowed = "move";
  event.dataTransfer.setData("text/plain", String(rowNumber));
}

function handleDragOver(event){
  event.preventDefault();
  event.currentTarget.classList.add("drag-over");
  event.dataTransfer.dropEffect = "move";
}

function handleDragLeave(event){
  event.currentTarget.classList.remove("drag-over");
}

function handleDragEnd(){
  document.querySelectorAll(".item.dragging,.item.drag-over").forEach(el=>{
    el.classList.remove("dragging");
    el.classList.remove("drag-over");
  });
}

async function handleDrop(event, targetRowNumber){
  event.preventDefault();
  event.stopPropagation();

  const sourceRowNumber = Number(draggedRowNumber || event.dataTransfer.getData("text/plain"));
  targetRowNumber = Number(targetRowNumber);

  handleDragEnd();

  if(!sourceRowNumber || !targetRowNumber || sourceRowNumber === targetRowNumber) return;

  const rect = event.currentTarget.getBoundingClientRect();
  const position = event.clientY > rect.top + rect.height / 2 ? "after" : "before";

  try{
    setStatus("Reordenando...", "");
    await postSheets("moveProductoTo", { sourceRowNumber, targetRowNumber, position });
    await cargar();
  }catch(e){
    console.error(e);
    setStatus("Error reordenando", "err");
    showError(e.message || String(e));
  }
}

(function(){
  const isStandalone = (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) ||
    window.navigator.standalone === true;
  if(!isStandalone) return;

  const indicator = document.getElementById("pull-indicator");
  const indicatorText = document.getElementById("pull-indicator-text");
  const THRESHOLD = 70;
  let startY = null;
  let dist = 0;
  let refreshing = false;

  function canPull(){
    return getUsuarioActual() &&
      document.getElementById("app-root").style.display !== "none" &&
      !document.body.classList.contains("no-scroll") &&
      window.scrollY <= 0;
  }

  function resetIndicator(){
    indicator.classList.remove("visible", "loading", "ready", "animated");
    indicator.style.transform = "translate(-50%, 0px)";
    dist = 0;
  }

  window.addEventListener("touchstart", (e) => {
    if(refreshing || !canPull()){ startY = null; return; }
    startY = e.touches[0].clientY;
    indicator.classList.remove("animated");
  }, { passive:true });

  window.addEventListener("touchmove", (e) => {
    if(startY === null || refreshing) return;
    const delta = e.touches[0].clientY - startY;
    if(delta > 0 && window.scrollY <= 0){
      e.preventDefault();
      dist = Math.min(delta * 0.5, 90);
      indicator.style.transform = `translate(-50%, ${dist}px)`;
      indicator.classList.add("visible");
      indicator.classList.toggle("ready", dist >= THRESHOLD);
      indicatorText.textContent = dist >= THRESHOLD ? "Suelta para actualizar" : "Desliza para actualizar";
    }
  }, { passive:false });

  window.addEventListener("touchend", async () => {
    if(startY === null || refreshing){ startY = null; return; }
    const shouldRefresh = dist >= THRESHOLD;
    startY = null;
    indicator.classList.add("animated");

    if(shouldRefresh){
      refreshing = true;
      indicator.style.transform = "translate(-50%, 74px)";
      indicator.classList.add("visible", "loading");
      indicator.classList.remove("ready");
      indicatorText.textContent = "Actualizando...";
      try{
        await cargar();
        cargarClima();
      }finally{
        setTimeout(() => {
          refreshing = false;
          resetIndicator();
        }, 400);
      }
    } else {
      resetIndicator();
    }
  });
})();
